<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ISP Billing Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://xbtuqubynkcqsiwavxad.supabase.co";
const ANON_KEY = "sb_publishable_V0DzqUUUFKhFpn3w3dJiPw_rqnzkWo4";
const SERVICE_ROLE_KEY = "SERVICE_ROLE_KEY_GANTI"; // opsional untuk create admin

const supabase = window.supabase.createClient(SUPABASE_URL, ANON_KEY);
const supabaseAdmin = SERVICE_ROLE_KEY !== "SERVICE_ROLE_KEY_GANTI"
  ? window.supabase.createClient(SUPABASE_URL, SERVICE_ROLE_KEY)
  : null;

/* LOGIN */
async function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  const {error} = await supabase.auth.signInWithPassword({email,password});
  if(error){
    alert("Login gagal");
  }else{
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    loadPaket();
    loadUsers();
  }
}

/* LOGOUT */
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

/* TAMBAH PAKET */
async function addPaket(){
  let nama=document.getElementById("nama_paket").value;
  let speed=document.getElementById("speed").value;
  let harga=document.getElementById("harga_paket").value;

  await supabase.from("paket").insert([{nama,speed,harga}]);
  loadPaket();
}

/* LOAD PAKET */
async function loadPaket(){
  const {data}=await supabase.from("paket").select("*");
  let select=document.getElementById("paket");
  select.innerHTML="";
  data.forEach(p=>{
    select.innerHTML+=`
      <option value="${p.nama}|${p.harga}">
        ${p.nama} - ${p.speed} - Rp${p.harga}
      </option>`;
  });
}

/* TAMBAH PELANGGAN */
async function addUser(){
  let nama=document.getElementById("nama").value;
  let paket=document.getElementById("paket").value;

  let p=paket.split("|");
  let namaPaket=p[0];
  let harga=p[1];

  let today=new Date();
  let daftar=today.toISOString().split("T")[0];

  today.setDate(today.getDate()+30);
  let tempo=today.toISOString().split("T")[0];

  await supabase.from("pelanggan").insert([{
    nama,
    paket:namaPaket,
    harga,
    tanggal_daftar:daftar,
    jatuh_tempo:tempo
  }]);

  loadUsers();
}

/* BAYAR */
async function bayar(id){
  let today=new Date();
  today.setDate(today.getDate()+30);
  let tempo=today.toISOString().split("T")[0];

  await supabase.from("pelanggan")
    .update({jatuh_tempo:tempo})
    .eq("id",id);

  loadUsers();
}

/* HAPUS */
async function deleteUser(id){
  await supabase.from("pelanggan").delete().eq("id",id);
  loadUsers();
}

/* LOAD USERS */
async function loadUsers(){
  const {data}=await supabase.from("pelanggan").select("*");

  let list=document.getElementById("users");
  list.innerHTML="";

  let total=0,aktif=0,telat=0,income=0;

  data.forEach(u=>{
    total++;
    income+=parseInt(u.harga);

    let today=new Date();
    let tempo=new Date(u.jatuh_tempo);

    let status="Aktif";
    let color="green";

    if(today>tempo){
      status="Telat";
      color="red";
      telat++;
    }else{
      aktif++;
    }

    list.innerHTML+=`
      <div class="border-b p-3 flex justify-between">
        <div>
          <p class="font-semibold">${u.nama}</p>
          <p class="text-sm">${u.paket}</p>
          <p class="text-xs">Tempo ${u.jatuh_tempo}</p>
        </div>
        <div class="text-right">
          <span class="bg-${color}-500 text-white px-2 py-1 rounded text-xs">${status}</span><br>
          <button onclick="bayar(${u.id})" class="text-green-600 text-xs">Bayar</button><br>
          <button onclick="deleteUser(${u.id})" class="text-red-500 text-xs">Hapus</button>
        </div>
      </div>`;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("aktif").innerText=aktif;
  document.getElementById("telat").innerText=telat;
  document.getElementById("income").innerText="Rp "+income;
}

/* TAMBAH ADMIN */
async function createAdmin(){
  if(!supabaseAdmin){
    alert("Service role key belum diisi.");
    return;
  }

  let email=document.getElementById("admin_email").value;
  let password=document.getElementById("admin_pass").value;

  const {error}=await supabaseAdmin.auth.admin.createUser({
    email,
    password,
    email_confirm:true
  });

  if(error){
    alert("Gagal buat admin");
  }else{
    alert("Admin dibuat");
  }
}
</script>
</head>

<body class="bg-gray-100">

<!-- LOGIN -->
<div id="loginPage" class="h-screen flex items-center justify-center">
  <div class="bg-white p-6 rounded shadow w-80">
    <h2 class="text-lg font-bold mb-4 text-center">Login Admin</h2>

    <input id="email" class="border w-full p-2 mb-2 rounded" placeholder="Email">
    <input id="password" type="password" class="border w-full p-2 mb-3 rounded" placeholder="Password">

    <button onclick="login()" class="bg-blue-500 text-white w-full p-2 rounded">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="bg-white shadow p-4 flex justify-between">
<h1 class="text-xl font-bold text-blue-600">ISP Billing Pro</h1>
<button onclick="logout()" class="text-red-500">Logout</button>
</div>

<div class="p-4">

<!-- DASHBOARD -->
<div class="grid grid-cols-2 gap-3 mb-5">
<div class="bg-blue-500 text-white p-4 rounded">Total<p id="total" class="text-2xl">0</p></div>
<div class="bg-green-500 text-white p-4 rounded">Aktif<p id="aktif" class="text-2xl">0</p></div>
<div class="bg-red-500 text-white p-4 rounded">Telat<p id="telat" class="text-2xl">0</p></div>
<div class="bg-purple-500 text-white p-4 rounded">Pendapatan<p id="income" class="text-2xl">0</p></div>
</div>

<!-- PAKET -->
<div class="bg-white p-4 rounded shadow mb-5">
<h3 class="font-semibold mb-3">Tambah Paket</h3>
<input id="nama_paket" class="border w-full p-2 mb-2 rounded" placeholder="Nama paket">
<input id="speed" class="border w-full p-2 mb-2 rounded" placeholder="Speed">
<input id="harga_paket" class="border w-full p-2 mb-3 rounded" placeholder="Harga">
<button onclick="addPaket()" class="bg-green-500 text-white px-4 py-2 rounded">Tambah Paket</button>
</div>

<!-- PELANGGAN -->
<div class="bg-white p-4 rounded shadow mb-5">
<h3 class="font-semibold mb-3">Tambah Pelanggan</h3>
<input id="nama" class="border w-full p-2 mb-2 rounded" placeholder="Nama pelanggan">
<select id="paket" class="border w-full p-2 mb-3 rounded"></select>
<button onclick="addUser()" class="bg-blue-500 text-white px-4 py-2 rounded">Tambah</button>
</div>

<!-- ADMIN -->
<div class="bg-white p-4 rounded shadow mb-5">
<h3 class="font-semibold mb-3">Tambah Admin</h3>
<input id="admin_email" class="border w-full p-2 mb-2 rounded" placeholder="Email">
<input id="admin_pass" type="password" class="border w-full p-2 mb-3 rounded" placeholder="Password">
<button onclick="createAdmin()" class="bg-indigo-500 text-white px-4 py-2 rounded">Buat Admin</button>
</div>

<!-- LIST -->
<div class="bg-white rounded shadow">
<div class="p-3 border-b font-semibold">Daftar Pelanggan</div>
<div id="users"></div>
</div>

</div>
</div>

</body>
</html>
