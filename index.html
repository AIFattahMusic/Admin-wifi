<!DOCTYPE html>

<html lang="id">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISP Admin Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#f2f4f7;
padding-bottom:80px;
}

/* HEADER */

.header{
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.header h2{
margin:0;
}

/* CONTAINER */

.container{
padding:15px;
}

/* DASHBOARD CARDS */

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
color:white;
padding:18px;
border-radius:12px;
}

.card span{
display:block;
font-size:26px;
margin-top:5px;
}

.blue{background:#2f65d9;}
.green{background:#2fb36a;}
.orange{background:#ff8b2d;}
.purple{background:#7b4bff;}

/* TABLE */

.table{
background:white;
border-radius:12px;
padding:15px;
margin-top:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.row:last-child{
border:none;
}

.status{
padding:5px 10px;
border-radius:6px;
font-size:12px;
color:white;
}

.aktif{background:#2fb36a;}
.telat{background:#ff4d4d;}

/* NAVBAR */

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.bottom div{
text-align:center;
font-size:12px;
}

.bottom span{
display:block;
font-size:22px;
}

</style>

</head>

<body>

<div class="header">
<h2>📡 ISP Admin</h2>
<div>Admin</div>
</div>

<div class="container">

<h3>Dashboard Pelanggan</h3>

<div class="cards">

<div class="card blue">
Total Pelanggan
<span>120</span>
</div>

<div class="card green">
Pelanggan Aktif
<span>95</span>
</div>

<div class="card orange">
Telat Bayar
<span>25</span>
</div>

<div class="card purple">
Pendapatan
<span>Rp 18.500.000</span>
</div>

</div>

<div class="table">

<h3>Daftar Pelanggan</h3>

<div class="row">
<div>
<b>Budi Santoso</b><br>
20 Mbps
</div>

<div>
<span class="status aktif">Aktif</span>
</div>
</div>

<div class="row">
<div>
<b>Siti Aminah</b><br>
10 Mbps
</div>

<div>
<span class="status telat">Telat</span>
</div>
</div>

<div class="row">
<div>
<b>Andi Pratama</b><br>
30 Mbps
</div>

<div>
<span class="status aktif">Aktif</span>
</div>
</div>

</div>

</div>

<div class="bottom">

<div>
<span>🏠</span>
Dashboard
</div>

<div>
<span>👤</span>
Pelanggan
</div>

<div>
<span>🌐</span>
Paket
</div>

<div>
<span>⚙️</span>
Pengaturan
</div>

</div>

</body>
</html>
