<!DOCTYPE html>

<html lang="id">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISP Admin</title>

<style>

body{
font-family:Arial;
background:#f2f4f7;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:340px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#2f65d9;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.msg{
margin-top:10px;
font-weight:bold;
}

.dashboard{
display:none;
padding:20px;
}

.card{
background:#2f65d9;
color:white;
padding:20px;
border-radius:10px;
margin:10px 0;
}

</style>

</head>

<body>

<div id="login" class="box">

<h2>Login ISP Admin</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg" class="msg"></div>

</div>

<div id="dashboard" class="dashboard">

<h2>Dashboard ISP</h2>

<div class="card">
Total Pelanggan : 120
</div>

<div class="card">
Pelanggan Aktif : 95
</div>

<div class="card">
Pendapatan : Rp 18.500.000
</div>

<button onclick="logout()">Logout</button>

</div>

<script>

function login(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(email=="admin@gmail.com" && password=="123456"){

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

}else{

document.getElementById("msg").innerText="Login gagal";

}

}

function logout(){

location.reload();

}

</script>

</body>
</html>
